<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmethystProtection Config Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="space" class="space"></div>
    <div class="app">
        <header class="header">
            <h1>AmethystProtection</h1>
            <p>Редактор конфигурации и сообщений</p>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="general">Основное</button>
            <button class="tab" data-tab="database">База данных</button>
            <button class="tab" data-tab="spawn">Спавн</button>
            <button class="tab" data-tab="season">Сезон</button>
            <button class="tab" data-tab="punishments">Наказания</button>
            <button class="tab" data-tab="messages">Сообщения</button>
            <button class="tab" data-tab="yaml">YAML</button>
        </nav>

        <main class="content">
            <section id="general" class="panel active">
                <h2>Основные настройки</h2>
                <div class="grid">
                    <label>
                        <span>Радиус спавна</span>
                        <input type="number" data-path="spawn-radius" value="250">
                    </label>
                    <label>
                        <span>Мир спавна</span>
                        <input type="text" data-path="spawn-world" value="world">
                    </label>
                    <label>
                        <span>Миры ферм</span>
                        <input type="text" data-path="farm-worlds" value="farm" placeholder="через запятую">
                    </label>
                    <label>
                        <span>Старт сезона</span>
                        <input type="text" data-path="season-start" value="2026-06-01 00:00:00">
                    </label>
                    <label>
                        <span>Часы новичка</span>
                        <input type="number" data-path="newbie-playtime-hours" value="30">
                    </label>
                    <label>
                        <span>Интервал сохранения (сек)</span>
                        <input type="number" data-path="playtime-save-interval-seconds" value="300">
                    </label>
                    <label>
                        <span>Ссылка на правила</span>
                        <input type="text" data-path="trust-link" value="https://example.com/rules">
                    </label>
                    <label>
                        <span>Язык по умолчанию</span>
                        <select data-path="language">
                            <option value="ru">ru</option>
                            <option value="en">en</option>
                        </select>
                    </label>
                    <label>
                        <span>Порог предупреждений</span>
                        <input type="number" data-path="warning-threshold" value="3">
                    </label>
                    <label>
                        <span>Длительность бана (часов)</span>
                        <input type="number" data-path="warning-ban-hours" value="1">
                    </label>
                    <label>
                        <span>Кулдаун уведомлений (сек)</span>
                        <input type="number" data-path="notify-cooldown-seconds" value="3">
                    </label>
                    <label>
                        <span>Кулдаун наказания (сек)</span>
                        <input type="number" data-path="punishment-cooldown-seconds" value="60">
                    </label>
                </div>
            </section>

            <section id="database" class="panel">
                <h2>База данных</h2>
                <div class="grid">
                    <label class="full">
                        <span>Тип базы данных</span>
                        <select data-path="database.type">
                            <option value="sqlite">SQLite</option>
                            <option value="mysql">MySQL</option>
                        </select>
                    </label>
                </div>
                <div class="grid" id="sqlite-settings">
                    <label>
                        <span>Файл SQLite</span>
                        <input type="text" data-path="database.sqlite.file" value="antigrief.db">
                    </label>
                </div>
                <div class="grid hidden" id="mysql-settings">
                    <label>
                        <span>Хост</span>
                        <input type="text" data-path="database.mysql.host" value="localhost">
                    </label>
                    <label>
                        <span>Порт</span>
                        <input type="number" data-path="database.mysql.port" value="3306">
                    </label>
                    <label>
                        <span>База данных</span>
                        <input type="text" data-path="database.mysql.database" value="minecraft">
                    </label>
                    <label>
                        <span>Логин</span>
                        <input type="text" data-path="database.mysql.username" value="root">
                    </label>
                    <label>
                        <span>Пароль</span>
                        <input type="password" data-path="database.mysql.password" value="password">
                    </label>
                    <label>
                        <span>SSL</span>
                        <select data-path="database.mysql.use-ssl">
                            <option value="false">false</option>
                            <option value="true">true</option>
                        </select>
                    </label>
                    <label>
                        <span>Размер пула</span>
                        <input type="number" data-path="database.mysql.pool-size" value="5">
                    </label>
                    <label>
                        <span>Таймаут подключения</span>
                        <input type="number" data-path="database.mysql.connection-timeout" value="30000">
                    </label>
                    <label>
                        <span>Idle таймаут</span>
                        <input type="number" data-path="database.mysql.idle-timeout" value="600000">
                    </label>
                    <label>
                        <span>Max lifetime</span>
                        <input type="number" data-path="database.mysql.max-lifetime" value="1800000">
                    </label>
                </div>
            </section>

            <section id="spawn" class="panel">
                <h2>Телепорт на спавн</h2>
                <div class="grid">
                    <label>
                        <span>Мир</span>
                        <input type="text" data-path="spawn-teleport.world" value="world">
                    </label>
                    <label>
                        <span>X</span>
                        <input type="number" step="0.1" data-path="spawn-teleport.x" value="0.5">
                    </label>
                    <label>
                        <span>Y</span>
                        <input type="number" step="0.1" data-path="spawn-teleport.y" value="64.0">
                    </label>
                    <label>
                        <span>Z</span>
                        <input type="number" step="0.1" data-path="spawn-teleport.z" value="0.5">
                    </label>
                    <label>
                        <span>Yaw</span>
                        <input type="number" step="0.1" data-path="spawn-teleport.yaw" value="0.0">
                    </label>
                    <label>
                        <span>Pitch</span>
                        <input type="number" step="0.1" data-path="spawn-teleport.pitch" value="0.0">
                    </label>
                </div>
            </section>

            <section id="season" class="panel">
                <h2>Сезонные события</h2>
                <div class="grid">
                    <label>
                        <span>Спящие дни</span>
                        <input type="number" data-path="season-events.sleeping-days" value="7">
                    </label>
                    <label>
                        <span>Середина сезона</span>
                        <input type="number" data-path="season-events.mid-season-day" value="30">
                    </label>
                    <label>
                        <span>Поздний сезон</span>
                        <input type="number" data-path="season-events.late-season-day" value="60">
                    </label>
                </div>
            </section>

            <section id="punishments" class="panel">
                <h2>Наказания</h2>
                <div class="grid">
                    <label class="full">
                        <span>Отправитель</span>
                        <input type="text" data-path="punishments.sender-name" value="AmethystProtection">
                    </label>
                    <label class="full">
                        <span>Причина предупреждения</span>
                        <input type="text" data-path="punishments.warn-reason" value="Убийство новичка в зоне спавна [{phase}, день {day}, {time}]">
                    </label>
                    <label class="full">
                        <span>Причина атаки</span>
                        <input type="text" data-path="punishments.attack-reason" value="Атака новичка в зоне спавна [{phase}, день {day}, {time}]">
                    </label>
                    <label class="full">
                        <span>Причина бана</span>
                        <input type="text" data-path="punishments.ban-reason" value="Повторные нарушения защиты новичков ({warnings}/{threshold}, {phase}, {time})">
                    </label>
                </div>
            </section>

            <section id="messages" class="panel">
                <h2>Сообщения</h2>
                <div class="lang-tabs">
                    <button class="lang-tab active" data-lang="ru">RU</button>
                    <button class="lang-tab" data-lang="en">EN</button>
                </div>
                <div class="message-layout">
                    <div id="message-editor" class="message-editor"></div>
                    <div class="preview-panel">
                        <h3>Предпросмотр</h3>
                        <div class="preview-controls">
                            <label>
                                <span>Ключ</span>
                                <select id="preview-key"></select>
                            </label>
                            <label>
                                <span>Аргументы (через запятую)</span>
                                <input type="text" id="preview-args" placeholder="player, 3, world">
                            </label>
                        </div>
                        <div class="preview-boxes">
                            <div class="preview-box">
                                <strong>Чат</strong>
                                <p id="preview-chat"></p>
                            </div>
                            <div class="preview-box">
                                <strong>Action bar</strong>
                                <p id="preview-actionbar"></p>
                            </div>
                            <div class="preview-box">
                                <strong>Цвета Minecraft</strong>
                                <p id="preview-colored"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="message-actions">
                    <button id="add-message" class="btn secondary">Добавить ключ</button>
                    <button id="sync-messages" class="btn secondary">Синхронизировать языки</button>
                </div>
            </section>

            <section id="yaml" class="panel">
                <h2>YAML конфиг</h2>
                <div class="yaml-actions">
                    <button id="download-yaml" class="btn">Скачать config.yml</button>
                    <label class="btn file-label">
                        Загрузить YAML
                        <input type="file" id="upload-yaml" accept=".yml,.yaml">
                    </label>
                    <button id="reset-yaml" class="btn secondary">Сбросить по умолчанию</button>
                </div>
                <textarea id="yaml-output" class="yaml-output" spellcheck="false"></textarea>
            </section>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <h3>Добавить новый ключ</h3>
            <input type="text" id="new-key" placeholder="new_message_key">
            <div class="modal-actions">
                <button id="confirm-add" class="btn">Добавить</button>
                <button id="cancel-add" class="btn secondary">Отмена</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Site made by Boostkey. All rights reserved.</p>
    </footer>

    <script src="javascript.js"></script>
</body>
</html>
